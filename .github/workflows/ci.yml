name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR on a new push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build & verify (Python 3.12)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (locked, all extras + dev)
        run: uv sync --locked --all-extras --dev

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: mypy (src only)
        run: uv run mypy src

      - name: pytest (branch coverage + threshold)
        run: |
          uv run pytest --cov-report=term-missing

      - name: Build sdist and wheel
        run: uv build

      - name: Distribution-content verification
        run: |
          uv run python scripts/verify_distribution.py \
            dist/*.whl \
            dist/*.tar.gz

      - name: Installed-wheel smoke test
        run: |
          uv run --isolated --no-project --with dist/*.whl \
            python -c "import osm_polygon_sentence_relevance as p; print(p.__version__); import osm_polygon_sentence_relevance.cli, osm_polygon_sentence_relevance.ingestion.acquisition, osm_polygon_sentence_relevance.sentences.finalization, osm_polygon_sentence_relevance.output.exporter, osm_polygon_sentence_relevance.joins"

      - name: Console CLI --help
        run: uv run --isolated --no-project --with dist/*.whl osm-polygon-sentence-relevance --help
